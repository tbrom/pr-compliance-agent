plugins {
    id 'java'
    id 'org.springframework.boot' version '3.2.3'
    id 'io.spring.dependency-management' version '1.1.4'
}

group = 'com.example.sentinel'
version = '0.0.1-SNAPSHOT'

java {
    sourceCompatibility = '17'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'dev.langchain4j:langchain4j-google-ai-gemini:0.35.0'
    implementation 'dev.langchain4j:langchain4j-spring-boot-starter:0.35.0'
    implementation 'io.micrometer:micrometer-tracing-bridge-otel'
    implementation 'com.google.cloud:spring-cloud-gcp-starter-trace:5.0.4'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

tasks.named('test') {
    useJUnitPlatform()
}
